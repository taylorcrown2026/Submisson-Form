<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Portal</title>
  <style>
    :root { --green:#0f3d25; --light:#f8fafc; --border:#e5e7eb; --text:#111827; --muted:#6b7280; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:Arial, Helvetica, sans-serif; background:var(--light); color:var(--text); }
    header { background:var(--green); color:white; padding:22px 28px; display:flex; justify-content:space-between; align-items:center; gap:16px; flex-wrap:wrap; }
    header h1 { margin:0; font-size:24px; }
    button, .button { border:0; background:#14532d; color:white; padding:11px 16px; border-radius:12px; cursor:pointer; font-weight:700; text-decoration:none; display:inline-block; }
    button:hover, .button:hover { background:#16a34a; }
    main { padding:24px; max-width:1280px; margin:0 auto; }
    .stats { display:grid; grid-template-columns:repeat(4,minmax(150px,1fr)); gap:16px; margin-bottom:18px; }
    .stat { background:white; border:1px solid var(--border); border-radius:18px; padding:18px; box-shadow:0 6px 20px rgba(0,0,0,.04); }
    .stat .num { font-size:30px; font-weight:800; margin-top:6px; }
    .toolbar { background:white; border:1px solid var(--border); border-radius:18px; padding:16px; margin-bottom:18px; display:grid; grid-template-columns:2fr 1fr 2fr auto; gap:12px; align-items:end; }
    label { font-weight:700; font-size:13px; color:#374151; display:block; margin-bottom:6px; }
    input, select { width:100%; padding:11px 12px; border:1px solid #d1d5db; border-radius:12px; font-size:14px; }
    .table-wrap { background:white; border:1px solid var(--border); border-radius:18px; overflow:auto; box-shadow:0 6px 20px rgba(0,0,0,.04); }
    table { width:100%; border-collapse:collapse; min-width:980px; }
    th, td { padding:13px 14px; border-bottom:1px solid var(--border); text-align:left; font-size:14px; vertical-align:top; }
    th { background:#f9fafb; font-size:12px; text-transform:uppercase; letter-spacing:.04em; color:#4b5563; cursor:pointer; }
    tr:hover td { background:#fcfcfd; }
    .pill { display:inline-block; padding:5px 10px; border-radius:999px; font-weight:800; font-size:12px; }
    .yes { background:#dcfce7; color:#14532d; }
    .no { background:#fee2e2; color:#991b1b; }
    .muted { color:var(--muted); }
    @media (max-width:900px) { .stats { grid-template-columns:repeat(2,1fr); } .toolbar { grid-template-columns:1fr; } }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Admin Portal</h1>
      <div class="muted" style="color:#d1fae5">Participant response tracking</div>
    </div>
    <div>
      <button id="sendEmailsBtn">Send Reminder Emails</button>
      <button id="exportBtn">Export Excel</button>
      <button id="logoutBtn">Log out</button>
    </div>
  </header>

  <main>

    <section style="margin-bottom:20px;">
  <button id="currentTab">Current Month</button>
  <button id="historyTab">View Previous Months</button>
</section>

<section class="stats">
  <div class="stat">
    <div class="muted">Total Submissions</div>
    <div id="total" class="num">0</div>
  </div>

  <div class="stat">
    <div class="muted">Departments Completed</div>
    <div id="completed" class="num">0</div>
  </div>

  <div class="stat">
    <div class="muted">Departments Missing</div>
    <div id="missing" class="num">0</div>
  </div>

  <div class="stat">
    <div class="muted">Selected Month</div>
    <div id="selectedMonth" class="num">-</div>
  </div>
</section>

    <section class="toolbar">
      <div>
        <label for="search">Search name, location, IP</label>
        <input id="search" placeholder="Search responses" />
      </div>

      <div>
  <label for="monthFilter">Month</label>
  <select id="monthFilter">
    <option value="All">All</option>
    <option>January</option>
    <option>February</option>
    <option>March</option>
    <option>April</option>
    <option>May</option>
    <option>June</option>
    <option>July</option>
    <option>August</option>
    <option>September</option>
    <option>October</option>
    <option>November</option>
    <option>December</option>
  </select>
</div>

<div>
  <label for="departmentFilter">Department</label>
  <select id="departmentFilter">
    <option value="All">All</option>
    <option>HR</option>
    <option>Finance</option>
    <option>IT</option>
    <option>Operations</option>
    <option>Clinical</option>
    <option>Legal</option>
  </select>
</div>

<div>
  <label for="statusFilter">Submission Status</label>
  <select id="statusFilter">
    <option value="All">All</option>
    <option value="Submitted">Submitted</option>
    <option value="Missing">Missing</option>
  </select>
</div>

      <button id="refreshBtn">Refresh</button>
    </section>

    <section id="missingBox" style="margin-bottom:20px;">
  <h3>Missing Departments</h3>
  <div id="missingList" style="color:#991b1b;font-weight:bold;"></div>
</section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-sort="timestamp">Submitted</th>
            <th data-sort="fullName">Full Name</th>
<th>Department</th>
<th>Month</th>
<th>File</th>
<th>Email</th>
          </tr>
        </thead>
        <tbody id="responseRows"></tbody>
      </table>
    </section>
  </main>

  <script>
    let responses = [];
    let sortKey = 'timestamp';
    let sortDir = 'desc';

    const rows = document.getElementById('responseRows');
    const search = document.getElementById('search');
  const departmentFilter = document.getElementById('departmentFilter');
  const statusFilter = document.getElementById('statusFilter');
  const monthFilter = document.getElementById('monthFilter');

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"']/g, (c) => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
      }[c]));
    }

    document.getElementById("exportBtn").addEventListener("click", () => {
  window.location.href = "/api/admin/export";
});

let viewMode = "current";

document.getElementById('currentTab').onclick = () => {
  viewMode = "current";
  render();
};

document.getElementById('historyTab').onclick = () => {
  viewMode = "history";
  render();
};

    function formatDate(value) {
      try { return new Date(value).toLocaleString(); } catch { return value; }
    }

    async function loadResponses() {
      const res = await fetch('/api/admin/responses');
      if (res.status === 401) {
        window.location.href = '/login.html';
        return;
      }
      const data = await res.json().catch(() => ({}));
      responses = data.responses || [];
      populateLocationFilter();
      render();
    }

    function populateLocationFilter() {
      const current = locationFilter.value;
      const locations = [...new Set(responses.map(r => r.location).filter(Boolean))].sort();
      locationFilter.innerHTML = '<option value="All">All locations</option>' +
        locations.map(l => `<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('');
      locationFilter.value = locations.includes(current) ? current : 'All';
    }

function getFiltered() {
  const q = search.value.trim().toLowerCase();

  let data = responses.filter(r => {
    const matchesQ =
      !q || [r.fullName, r.workEmail, r.department]
      .some(v => String(v || '').toLowerCase().includes(q));

    const matchesDept =
      departmentFilter.value === 'All' || r.department === departmentFilter.value;

    const matchesMonth =
      monthFilter.value === 'All' || r.month === monthFilter.value;

      const isCurrent = r.month === monthFilter.value;

const matchesView =
  viewMode === "current"
    ? (monthFilter.value === 'All' || isCurrent)
    : true;

    return matchesQ && matchesDept && matchesMonth && matchesView;
  });

  return data;
}

    function render() {
const selectedMonth = monthFilter.value;

// If "All" is selected, show everything, otherwise filter by month
const filteredMonthData = getFiltered();

// Master department list
const ALL_DEPARTMENTS = ["HR","Finance","IT","Operations","Clinical","Legal"];

// Get departments that submitted
const submittedDepts = [...new Set(filteredMonthData.map(r => r.department))];

// Remove duplicates
const uniqueSubmitted = [...new Set(submittedDepts)];

// Find missing departments
const missingDepts = ALL_DEPARTMENTS.filter(d => !uniqueSubmitted.includes(d));

// Update dashboard numbers
document.getElementById('total').textContent = filteredMonthData.length;
document.getElementById('completed').textContent = uniqueSubmitted.length;
document.getElementById('missing').textContent = missingDepts.length;
document.getElementById('selectedMonth').textContent = selectedMonth;

      const data = getFiltered();
      rows.innerHTML = data.length
        ? data.map(r => `
            <tr>
              <td>${escapeHtml(formatDate(r.timestamp))}</td>
              <td><strong>${escapeHtml(r.fullName)}</strong></td>
<td>${escapeHtml(r.department)}</td>
<td>${escapeHtml(r.month)}</td>
<td>
  .fileUrl}" target="_blank">View</a>
  |
  /api/download/${r.fileUrl.split('/').pop()}">⬇</a>
</td>
<td>${escapeHtml(r.workEmail)}</td>
            </tr>
          `).join('')
        : '<tr><td colspan="6" class="muted">No responses found.</td></tr>';
    }

    renderMissing();

    document.querySelectorAll('th[data-sort]').forEach(th =>
      th.addEventListener('click', () => {
        const key = th.dataset.sort;
        if (sortKey === key) sortDir = (sortDir === 'asc') ? 'desc' : 'asc';
        else { sortKey = key; sortDir = 'asc'; }
        render();
      })
    );

[search, departmentFilter, monthFilter].forEach(el =>
  el.addEventListener('input', render)
);

    document.getElementById('refreshBtn').addEventListener('click', loadResponses);

    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await fetch('/api/logout', { method: 'POST' });
      window.location.href = '/login.html';
    });

    loadResponses();

    const ALL_DEPARTMENTS = [
  "HR",
  "Finance",
  "IT",
  "Operations",
  "Clinical",
  "Legal"
];

function renderMissing() {
  const selectedMonth = monthFilter.value;

  if (selectedMonth === 'All') {
    document.getElementById('missingList').textContent = '';
    return;
  }

  const submitted = responses
    .filter(r => r.month === selectedMonth)
    .map(r => r.department);

  const missing = ALL_DEPARTMENTS.filter(d => !submitted.includes(d));

  document.getElementById('missingList').textContent =
    missing.length ? missing.join(", ") : "All departments submitted ✅";
}

renderMissing();

document.getElementById('sendEmailsBtn').addEventListener('click', async () => {
  const month = prompt("Enter month to send reminders for:");

  if (!month) return;

  const res = await fetch('/api/admin/send-reminders', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({ month })
  });

  const data = await res.json();

  alert("Emails sent to: " + (data.sentTo || []).join(", "));
});

  </script>
</body>
</html>
