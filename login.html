<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login</title>
  <style>
    body { margin:0; font-family:Arial, Helvetica, sans-serif; background:#f3f4f6; color:#111827; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .card { width:100%; max-width:420px; background:white; border-radius:20px; box-shadow:0 20px 50px rgba(0,0,0,.08); padding:32px; border:1px solid #e5e7eb; }
    h1 { margin:0 0 8px; }
    p { color:#6b7280; line-height:1.45; }
    label { display:block; margin:18px 0 8px; font-weight:700; }
    input { width:100%; padding:13px 14px; border:1px solid #d1d5db; border-radius:12px; font-size:16px; }
    button { width:100%; margin-top:22px; padding:14px 18px; border:0; border-radius:12px; background:#0f3d25; color:white; font-size:16px; font-weight:700; cursor:pointer; }
    button:hover { background:#16a34a; }
    .message { margin-top:16px; padding:12px; border-radius:12px; display:none; }
    .error { background:#fee2e2; color:#991b1b; border:1px solid #fecaca; }
    .small { margin-top:16px; font-size:13px; }
    a { color:#14532d; font-weight:700; text-decoration:none; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Admin Login</h1>
    <p>Authorized administrators only. Log in to view participant responses.</p>

    <form id="loginForm">
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required />

      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required />

      <button type="submit">Log in</button>
      <div id="message" class="message error"></div>
    </form>

    <p class="small"><a href="/">Back to participant form</a></p>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const message = document.getElementById('message');

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      message.style.display = 'none';

      const payload = {
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      };

      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        if (!res.ok) {
          const data = await res.json().catch(() => ({}));
          throw new Error(data.error || 'Login failed');
        }

        window.location.href = '/admin-portal.html';
      } catch (err) {
        message.textContent = err.message || 'Login failed';
        message.style.display = 'block';
      }
    });
  </script>
</body>
</html>
